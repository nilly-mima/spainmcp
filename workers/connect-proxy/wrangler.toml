name = "spainmcp-connect"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[vars]
SUPABASE_URL = "https://xjumlmtepbzebuxbhksu.supabase.co"

# Secrets (set via `wrangler secret put`):
# SUPABASE_SERVICE_ROLE_KEY
# GITHUB_CLIENT_ID
# GITHUB_CLIENT_SECRET

# KV namespace for OAuth session state
[[kv_namespaces]]
binding = "OAUTH_KV"
id = "81fbab580b6b4486bf120d68459be0aa"

# Analytics Engine for RPC metering (replaces connection_logs for high-perf metering)
[[analytics_engine_datasets]]
binding = "USAGE"
dataset = "spainmcp_rpcs"
